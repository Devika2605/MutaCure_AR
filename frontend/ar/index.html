<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<title>MutaCure AR</title>
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no"/>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#000; overflow:hidden; font-family: monospace; }
  #ui {
    position:fixed; top:12px; left:12px; z-index:999;
    background:rgba(13,26,15,0.88); border:1px solid rgba(74,163,84,0.35);
    border-radius:10px; padding:10px 14px; color:#e8f0e8; max-width:200px;
  }
  #ui h2 { font-size:13px; color:#6fcf7a; margin-bottom:3px; }
  #ui p  { font-size:10px; color:rgba(232,240,232,0.5); line-height:1.4; }
  #status {
    position:fixed; bottom:20px; left:50%; transform:translateX(-50%);
    background:rgba(13,26,15,0.92); border:1px solid rgba(74,163,84,0.3);
    border-radius:20px; padding:8px 20px;
    color:rgba(232,240,232,0.5); font-size:11px; z-index:999;
    transition: all 0.3s ease; white-space:nowrap;
  }
  #mut-badge {
    position:fixed; top:12px; right:12px; z-index:999;
    background:rgba(224,92,92,0.15); border:1px solid rgba(224,92,92,0.35);
    border-radius:8px; padding:8px 12px;
    color:#e8a0a0; font-size:10px; max-width:170px; line-height:1.4;
  }
  #gesture-hint {
    position:fixed; bottom:60px; left:50%; transform:translateX(-50%);
    background:rgba(13,26,15,0.7); border-radius:16px; padding:6px 14px;
    color:rgba(232,240,232,0.4); font-size:10px; z-index:999;
    pointer-events:none;
  }
  a-scene { width:100vw; height:100vh; }
</style>
<script src="https://cdn.jsdelivr.net/npm/aframe@1.4.2/dist/aframe.min.js"></script>
<script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
</head>
<body>

<div id="ui">
  <h2 id="protein-title">MutaCure AR</h2>
  <p id="protein-sub">Point camera at Hiro marker</p>
</div>
<div id="status">Initializing camera...</div>
<div id="mut-badge" id="mut-badge"></div>
<div id="gesture-hint">Pinch to zoom · Drag to rotate</div>

<a-scene
  embedded
  arjs="sourceType:webcam; debugUIEnabled:false; detectionMode:mono_and_matrix; matrixCodeType:3x3;"
  vr-mode-ui="enabled:false"
  renderer="logarithmicDepthBuffer:true; antialias:true"
  id="arscene">

  <a-marker preset="hiro" id="marker">
    <!-- Protein entity — controlled by JS -->
    <a-entity id="protein-root" position="0 0 0">
      <a-entity id="protein-pivot" position="0 0.8 0">
        <!-- Content injected by JS based on disease param -->
      </a-entity>
    </a-entity>
  </a-marker>

  <a-entity camera></a-entity>
</a-scene>

<script>
// ─── URL params ───────────────────────────────────────────────
var params   = new URLSearchParams(window.location.search);
var disease  = params.get("disease")  || "Type 2 Diabetes";
var protein  = params.get("protein")  || "PPARG";
var mut      = params.get("mut")      || "P115Q";
var risk     = params.get("risk")     || "0.87";

// ─── Disease models ───────────────────────────────────────────
var MODELS = {
  "Type 2 Diabetes": {
    color: "#1D9E75", mutColor: "#e05c5c", accent: "#5DCAA5",
    shape: "helix",   label: "PPARG / T2D",
    desc: "Nuclear receptor — metabolic regulation"
  },
  "Breast Cancer": {
    color: "#5b9bd5", mutColor: "#e05c5c", accent: "#85B7EB",
    shape: "barrel",  label: "BRCA1 / Breast Cancer",
    desc: "DNA repair tumor suppressor"
  },
  "Lung Cancer": {
    color: "#EF9F27", mutColor: "#e05c5c", accent: "#FAC775",
    shape: "kinase",  label: "EGFR / Lung Cancer",
    desc: "Receptor tyrosine kinase"
  },
  "Alzheimer's Disease": {
    color: "#9F77DD", mutColor: "#e05c5c", accent: "#AFA9EC",
    shape: "bundle",  label: "APOE / Alzheimer's",
    desc: "Lipid transport — APOE4 risk variant"
  }
};

var model = MODELS[disease] || MODELS["Type 2 Diabetes"];

// ─── Update UI ────────────────────────────────────────────────
document.getElementById("protein-title").textContent = model.label;
document.getElementById("protein-sub").textContent   = model.desc;
document.getElementById("mut-badge").textContent     = "⚠ Mutation: " + mut + "  Risk: " + risk;

// ─── Build AR model ───────────────────────────────────────────
var pivot = document.getElementById("protein-pivot");

function makeSphere(pos, r, color, pulse) {
  var el = document.createElement("a-sphere");
  el.setAttribute("position", pos);
  el.setAttribute("radius", r);
  el.setAttribute("color", color);
  el.setAttribute("material", "roughness:0.3; metalness:0.2");
  if (pulse) {
    el.setAttribute("animation", "property:scale; from:1 1 1; to:1.5 1.5 1.5; loop:true; dur:800; direction:alternate; easing:easeInOutSine");
  }
  return el;
}

function makeCyl(pos, r, h, color, rot) {
  var el = document.createElement("a-cylinder");
  el.setAttribute("position", pos);
  el.setAttribute("radius", r);
  el.setAttribute("height", h);
  el.setAttribute("color", color);
  el.setAttribute("rotation", rot || "0 0 0");
  el.setAttribute("material", "roughness:0.4; metalness:0.15");
  return el;
}

function makeBox(pos, w, h, d, color, rot) {
  var el = document.createElement("a-box");
  el.setAttribute("position", pos);
  el.setAttribute("width", w); el.setAttribute("height", h); el.setAttribute("depth", d);
  el.setAttribute("color", color);
  el.setAttribute("rotation", rot || "0 0 0");
  el.setAttribute("material", "roughness:0.4; metalness:0.1");
  return el;
}

function makeLabel(val, pos, color, width) {
  var el = document.createElement("a-text");
  el.setAttribute("value", val);
  el.setAttribute("position", pos);
  el.setAttribute("align", "center");
  el.setAttribute("color", color || "#e8f0e8");
  el.setAttribute("width", width || "2");
  return el;
}

function makeTorus(pos, r, rt, color, rot) {
  var el = document.createElement("a-torus");
  el.setAttribute("position", pos);
  el.setAttribute("radius", r);
  el.setAttribute("radius-tubular", rt);
  el.setAttribute("color", color);
  el.setAttribute("rotation", rot || "0 0 0");
  return el;
}

// Spinning wrapper
var spinner = document.createElement("a-entity");
spinner.setAttribute("animation", "property:rotation; from:0 0 0; to:0 360 0; loop:true; dur:9000; easing:linear");

if (model.shape === "helix") {
  // PPARG — alpha helix bundle
  spinner.appendChild(makeCyl("-0.15 0 0",    0.07, 0.7,  model.color,  "15 0 10"));
  spinner.appendChild(makeCyl("0.15 0.1 0.1", 0.06, 0.55, model.color,  "-10 20 5"));
  spinner.appendChild(makeBox("0 0.2 -0.2",   0.35, 0.06, 0.15, "#0F6E56", "5 -15 0"));
  spinner.appendChild(makeBox("0.1 -0.1 0.2", 0.3,  0.06, 0.12, "#0F6E56", "-5 10 0"));
  spinner.appendChild(makeTorus("-0.05 0.35 0", 0.12, 0.02, model.accent, "45 0 30"));
  // Backbone dots
  ["-0.2 -0.35 0","-0.1 -0.2 0.1","0 -0.05 0.15","0.1 0.1 0.1","0.15 0.25 0","0 0.38 -0.1"].forEach(function(p){
    spinner.appendChild(makeSphere(p, 0.04, model.accent, false));
  });

} else if (model.shape === "barrel") {
  // BRCA1 — beta barrel
  for (var i=0; i<8; i++) {
    var angle = (i/8)*Math.PI*2;
    var x = Math.cos(angle)*0.28, z = Math.sin(angle)*0.28;
    spinner.appendChild(makeCyl(x+" 0 "+z, 0.045, 0.75, model.color, "0 0 0"));
  }
  spinner.appendChild(makeSphere("0 0 0", 0.12, model.accent, false));
  spinner.appendChild(makeBox("0 0.42 0", 0.6, 0.06, 0.6, "#0C447C", "0 0 0"));
  spinner.appendChild(makeBox("0 -0.42 0", 0.6, 0.06, 0.6, "#0C447C", "0 0 0"));

} else if (model.shape === "kinase") {
  // EGFR — kinase two-lobe
  spinner.appendChild(makeCyl("0 0.15 0",   0.22, 0.45, model.color,  "0 0 0"));
  spinner.appendChild(makeCyl("0 -0.2 0",   0.18, 0.35, "#BA7517",    "0 0 0"));
  spinner.appendChild(makeBox("0 -0.02 0",  0.45, 0.06, 0.3, "#633806", "0 0 0"));
  spinner.appendChild(makeTorus("0 0 0",    0.32, 0.02, model.accent, "90 0 0"));
  // ATP binding site
  spinner.appendChild(makeSphere("0.15 0 0.1", 0.07, model.accent, false));

} else if (model.shape === "bundle") {
  // APOE — 4-helix bundle
  var bPos = ["-0.15 0 -0.15","0.15 0 -0.15","0.15 0 0.15","-0.15 0 0.15"];
  var bRot = ["0 0 -8","0 0 8","0 0 -8","0 0 8"];
  bPos.forEach(function(p,i){
    spinner.appendChild(makeCyl(p, 0.055, 0.7, model.color, bRot[i]));
  });
  // Connecting loops
  spinner.appendChild(makeTorus("0 0.35 0", 0.18, 0.02, model.accent, "0 0 0"));
  spinner.appendChild(makeTorus("0 -0.35 0",0.18, 0.02, model.accent, "0 0 0"));
  spinner.appendChild(makeSphere("0 0 0", 0.08, model.accent, false));
}

// MUTATION SITE — always red pulsing sphere
var mutSite = makeSphere("-0.15 0.2 0.05", 0.1, model.mutColor, true);
mutSite.setAttribute("material", "roughness:0.2; metalness:0.3; emissive:#440000; emissiveIntensity:0.5");
spinner.appendChild(mutSite);

// Mutation label
spinner.appendChild(makeLabel(mut, "-0.15 0.44 0.05", model.mutColor, "1.2"));

pivot.appendChild(spinner);

// Floating title above
var titleEl = document.createElement("a-entity");
titleEl.setAttribute("position", "0 1.8 0");
titleEl.setAttribute("animation", "property:position; from:0 1.8 0; to:0 1.95 0; loop:true; dur:2500; direction:alternate; easing:easeInOutSine");
titleEl.appendChild(makeLabel(protein + " Mutant\n" + disease, "0 0 0", model.color, "2.5"));
pivot.appendChild(titleEl);

// Binding pocket — translucent sphere
var pocket = document.createElement("a-sphere");
pocket.setAttribute("position", "0.05 -0.05 0");
pocket.setAttribute("radius", "0.22");
pocket.setAttribute("color", "#5b9bd5");
pocket.setAttribute("material", "opacity:0.12; transparent:true");
pivot.appendChild(pocket);

// Glow ring on marker
var ring = document.createElement("a-torus");
ring.setAttribute("position", "0 0.01 0");
ring.setAttribute("rotation", "-90 0 0");
ring.setAttribute("radius", "0.7");
ring.setAttribute("radius-tubular", "0.015");
ring.setAttribute("color", model.color);
ring.setAttribute("material", "opacity:0.5; transparent:true");
ring.setAttribute("animation", "property:rotation; from:-90 0 0; to:-90 360 0; loop:true; dur:10000; easing:linear");
document.getElementById("protein-root").appendChild(ring);

// ─── Marker events ────────────────────────────────────────────
var marker = document.getElementById("marker");
var status = document.getElementById("status");

marker.addEventListener("markerFound", function() {
  status.textContent = "✓ Marker found — " + protein + " active";
  status.style.borderColor = "rgba(74,163,84,0.6)";
  status.style.color = "#6fcf7a";
  document.getElementById("gesture-hint").style.display = "block";
});
marker.addEventListener("markerLost", function() {
  status.textContent = "Point camera at the Hiro marker";
  status.style.borderColor = "rgba(74,163,84,0.3)";
  status.style.color = "rgba(232,240,232,0.5)";
  document.getElementById("gesture-hint").style.display = "none";
});
document.getElementById("arscene").addEventListener("loaded", function() {
  status.textContent = "Point camera at the Hiro marker";
});

// ─── Pinch to zoom + drag to rotate ───────────────────────────
var pivot3d = document.getElementById("protein-pivot");
var scale = 1.0;
var rotY = 0;
var lastTouchDist = null;
var lastTouchX = null;
var touching = false;

function getTouchDist(e) {
  var dx = e.touches[0].clientX - e.touches[1].clientX;
  var dy = e.touches[0].clientY - e.touches[1].clientY;
  return Math.sqrt(dx*dx + dy*dy);
}

document.addEventListener("touchstart", function(e) {
  if (e.touches.length === 2) {
    lastTouchDist = getTouchDist(e);
  } else if (e.touches.length === 1) {
    lastTouchX = e.touches[0].clientX;
    touching = true;
  }
}, {passive:true});

document.addEventListener("touchmove", function(e) {
  if (e.touches.length === 2) {
    var dist = getTouchDist(e);
    if (lastTouchDist) {
      var delta = (dist - lastTouchDist) * 0.005;
      scale = Math.max(0.4, Math.min(3.0, scale + delta));
      pivot3d.setAttribute("scale", scale+" "+scale+" "+scale);
    }
    lastTouchDist = dist;
  } else if (e.touches.length === 1 && touching) {
    var dx = e.touches[0].clientX - lastTouchX;
    rotY += dx * 0.5;
    // Override the auto-spin with manual rotation
    spinner.removeAttribute("animation");
    spinner.setAttribute("rotation", "0 "+rotY+" 0");
    lastTouchX = e.touches[0].clientX;
  }
}, {passive:true});

document.addEventListener("touchend", function(e) {
  lastTouchDist = null;
  touching = false;
  // Resume auto-spin after 2s of no touch
  clearTimeout(window._spinTimer);
  window._spinTimer = setTimeout(function() {
    spinner.setAttribute("animation", "property:rotation; from:0 "+rotY+" 0; to:0 "+(rotY+360)+" 0; loop:true; dur:9000; easing:linear");
  }, 2000);
}, {passive:true});
</script>
</body>
</html>
