<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Mol* Viewer</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/molstar@3.45.0/build/viewer/molstar.css"/>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; background: #080f09; overflow: hidden; }
  #app { width: 100%; height: 100%; }
  #status {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
    color: #6fcf7a; font-family: monospace; font-size: 13px; text-align: center;
  }
  .dot { animation: blink 1s step-start infinite; display: inline-block; }
  @keyframes blink { 50% { opacity: 0; } }
</style>
</head>
<body>
<div id="app"></div>
<div id="status">Loading structure<span class="dot">...</span></div>
<script src="https://cdn.jsdelivr.net/npm/molstar@3.45.0/build/viewer/molstar.js"></script>
<script>
window.addEventListener("load", async function() {
  var params = new URLSearchParams(window.location.search);
  var pdbUrl = params.get("pdb");
  if (!pdbUrl) { document.getElementById("status").textContent = "No PDB URL provided."; return; }
  try {
    var viewer = await molstar.Viewer.create("app", {
      layoutIsExpanded: false,
      layoutShowControls: false,
      layoutShowRemoteState: false,
      layoutShowSequence: false,
      layoutShowLog: false,
      layoutShowLeftPanel: false,
      viewportShowExpand: false,
      viewportShowSelectionMode: false,
      viewportShowAnimation: false,
    });
    await viewer.loadStructureFromUrl(pdbUrl, "pdb", false);
    document.getElementById("status").style.display = "none";
  } catch(err) {
    document.getElementById("status").textContent = "Error: " + err.message;
  }
});
</script>
</body>
</html>
